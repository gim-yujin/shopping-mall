name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      JDK_JAVA_OPTIONS: --enable-native-access=ALL-UNNAMED
      ORG_GRADLE_JVMARGS: -Xmx2g -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run quality checks (blocking)
        run: ./gradlew check

      - name: Run SpotBugs (non-blocking, Java 21 compatibility fallback)
        continue-on-error: true
        run: ./gradlew spotbugsMain spotbugsTest -PenableSpotbugs=true

      - name: Run tests
        run: ./gradlew test

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          if-no-files-found: warn
          path: |
            build/reports/checkstyle/**
            build/reports/pmd/**
            build/reports/spotbugs/**
            build/test-results/test/**
