name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      JDK_JAVA_OPTIONS: --enable-native-access=ALL-UNNAMED
      ORG_GRADLE_JVMARGS: -Xmx2g -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: shopping_mall_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 4321
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d shopping_mall_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL readiness
        run: |
          until pg_isready -h localhost -p 5432 -U postgres -d shopping_mall_db; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run quality checks (blocking)
        env:
          TEST_DB_URL: jdbc:postgresql://localhost:5432/shopping_mall_db?stringtype=unspecified
          TEST_DB_USERNAME: postgres
          TEST_DB_PASSWORD: 4321
        run: ./gradlew check

      - name: Run SpotBugs (non-blocking, Java 21 compatibility fallback)
        continue-on-error: true
        run: ./gradlew spotbugsMain spotbugsTest -PenableSpotbugs=true

      - name: Run tests
        env:
          TEST_DB_URL: jdbc:postgresql://localhost:5432/shopping_mall_db?stringtype=unspecified
          TEST_DB_USERNAME: postgres
          TEST_DB_PASSWORD: 4321
        run: ./gradlew test

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          if-no-files-found: warn
          path: |
            build/reports/checkstyle/**
            build/reports/pmd/**
            build/reports/spotbugs/**
            build/test-results/test/**
