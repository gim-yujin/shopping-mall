groups:
  - name: shopping-mall-kpi
    interval: 15s
    rules:
      - record: shopping_mall:http_rps:rate1m
        expr: sum(rate(http_server_requests_seconds_count{application="shopping-mall"}[1m]))

      - record: shopping_mall:http_error_rate:ratio1m
        expr: |
          sum(rate(http_server_requests_seconds_count{application="shopping-mall",status=~"5.."}[1m]))
          /
          clamp_min(sum(rate(http_server_requests_seconds_count{application="shopping-mall"}[1m])), 1)

      - record: shopping_mall:http_p95_seconds:route
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, uri, method) (
              rate(http_server_requests_seconds_bucket{application="shopping-mall"}[5m])
            )
          )

      - record: shopping_mall:jvm_heap_used_bytes
        expr: sum(jvm_memory_used_bytes{application="shopping-mall",area="heap"})

      - record: shopping_mall:hikaricp_active_connections
        expr: sum(hikaricp_connections_active{application="shopping-mall"})

      # ── GC 모니터링 ──
      - record: shopping_mall:jvm_gc_pause_seconds:rate1m
        expr: sum(rate(jvm_gc_pause_seconds_sum{application="shopping-mall"}[1m]))

      - record: shopping_mall:jvm_gc_pause_count:rate1m
        expr: sum(rate(jvm_gc_pause_seconds_count{application="shopping-mall"}[1m]))

      # ── HikariCP 대기 커넥션 ──
      - record: shopping_mall:hikaricp_pending_connections
        expr: sum(hikaricp_connections_pending{application="shopping-mall"})

      # ── HTTP 상태코드별 RPS ──
      - record: shopping_mall:http_rps_by_status:rate1m
        expr: sum by (status) (rate(http_server_requests_seconds_count{application="shopping-mall"}[1m]))

      # ── Caffeine 캐시 적중률 ──
      - record: shopping_mall:cache_hit_ratio:rate1m
        expr: |
          sum by (cache) (rate(cache_gets_total{application="shopping-mall",result="hit"}[1m]))
          /
          clamp_min(
            sum by (cache) (rate(cache_gets_total{application="shopping-mall"}[1m])),
            1
          )
