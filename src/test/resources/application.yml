spring:
  application:
    name: shopping-mall

  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/shopping_mall_db?stringtype=unspecified}
    username: ${TEST_DB_USERNAME:postgres}
    password: ${TEST_DB_PASSWORD:4321}
    hikari:
      maximum-pool-size: 17
      minimum-idle: 17
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 5000

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  sql:
    init:
      mode: always
      schema-locations: classpath:test-reset.sql,classpath:schema.sql
      data-locations: classpath:test-seed.sql

  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json

logging:
  level:
    root: INFO
    com.shop: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
